[threads]
post_url = { optional = false, explanation = "Link bài đăng Threads muốn tạo video", example = "https://www.threads.net/@username/post/abc123" }
max_comments = { optional = false, default = 5, type = "int", explanation = "Số lượng bình luận tối đa để đọc" }
min_comment_length = { optional = true, default = 1, type = "int", explanation = "Số ký tự tối thiểu của một bình luận" }
max_comment_length = { optional = true, default = 500, type = "int", explanation = "Số ký tự tối đa của một bình luận" }
post_lang = { optional = true, default = "vi", explanation = "Ngôn ngữ của video (ví dụ: vi, en)." }
blocked_words = { optional = true, default = "", explanation = "Từ bị chặn, cách nhau bởi dấu phẩy" }

[settings]
allow_nsfw = { optional = false, type = "bool", default = false, example = false, options = [true, false, ], explanation = "Whether to allow NSFW content, True or False" }
theme = { optional = false, default = "dark", example = "light", options = ["dark", "light", "transparent", ], explanation = "Sets the background theme" }
times_to_run = { optional = false, default = 1, example = 2, explanation = "Used if you want to run multiple times.", type = "int", nmin = 1 }
opacity = { optional = false, default = 0.9, example = 0.8, explanation = "Sets the opacity of the comments", type = "float", nmin = 0, nmax = 1 }
storymode = { optional = true, type = "bool", default = false, example = false, options = [true, false,], explanation = "Only read out title and post content" }
storymodemethod= { optional = true, default = 1, example = 1, explanation = "Style that's used for the storymode.", type = "int", nmin = 0, options = [0, 1] }
storymode_max_length = { optional = true, default = 1000, example = 1000, explanation = "Max length of the storymode video", type = "int", nmin = 1 }
resolution_w = { optional = false, default = 1080, example = 1440, explantation = "Sets the width in pixels" }
resolution_h = { optional = false, default = 1920, example = 2560, explantation = "Sets the height in pixels" }
zoom = { optional = true, default = 1, example = 1.1, explanation = "Sets the browser zoom level.", type = "float", nmin = 0.1, nmax = 2 }
channel_name = { optional = true, default = "Threads TV", example = "Threads Stories", explanation = "Sets the channel name" }

[settings.background]
background_video = { optional = true, default = "minecraft", example = "gta", options = ["minecraft", "gta", "rocket-league", "motor-gta", "csgo-surf", "cluster-truck", "minecraft-2","multiversus","fall-guys","steep", ""], explanation = "Sets the background for the video" }
background_audio = { optional = true, default = "lofi", example = "chill-summer", options = ["lofi","lofi-2","chill-summer",""], explanation = "Sets the background audio" }
background_audio_volume = { optional = true, type = "float", nmin = 0, nmax = 1, default = 0.15, example = 0.05, explanation="Volume (0-1)"}
enable_extra_audio = { optional = true, type = "bool", default = false, example = false, explanation="Render another video without background audio"}
background_thumbnail = { optional = true, type = "bool", default = false, example = false, options = [true, false,], explanation = "Generate a thumbnail" }
background_thumbnail_font_family = { optional = true, default = "arial", example = "arial", explanation = "Font for thumbnail" }
background_thumbnail_font_size = { optional = true, type = "int", default = 96, example = 96, explanation = "Font size for thumbnail" }
background_thumbnail_font_color = { optional = true, default = "255,255,255", example = "255,255,255", explanation = "Font color for thumbnail" }

[settings.tts]
voice_choice = { optional = false, default = "googletranslate", options = ["elevenlabs", "streamlabspolly", "tiktok", "googletranslate", "awspolly", "pyttsx", "EdgeTTS", "OpenAI", "GHVoice"], example = "googletranslate", explanation = "The voice platform used" }
random_voice = { optional = false, type = "bool", default = false, example = false, options = [true, false,], explanation = "Randomizes voice" }
elevenlabs_voice_name = { optional = false, default = "Bella", example = "Bella", explanation = "Elevenlabs voice" }
elevenlabs_api_key = { optional = true, example = "", explanation = "API Key" }
tiktok_voice = { optional = true, default = "en_us_001", example = "en_us_006", explanation = "TikTok voice" }
tiktok_sessionid = { optional = true, example = "", explanation = "TikTok sessionid" }
python_voice = { optional = false, default = "1", example = "1", explanation = "System voice index" }
py_voice_num = { optional = false, default = "2", explanation = "Number of system voices" }
silence_duration = { optional = true, example = "0.3", explanation = "Silence between comments", default = 0.3, type = "float" }
no_emojis = { optional = false, type = "bool", default = false, example = false, options = [true, false,], explanation = "Remove emojis" }
openai_api_key = { optional = true, example = "", explanation = "OpenAI API Key" }
openai_voice_name = { optional = false, default = "alloy", explanation = "OpenAI voice" }
voice_speed = { optional = true, type = "float", default = 1.0, example = 1.2, explanation = "Speed of the TTS voice (e.g. 1.2 is 20% faster)" }
gh_voice_name = { optional = true, default = "Ngọc Huyền 01", explanation = "Tên giọng nói GH Voice (trong thư mục saved_voices)" }
gh_voice_model = { optional = true, default = "k2-fsa/OmniVoice", explanation = "Model path cho GH Voice" }
